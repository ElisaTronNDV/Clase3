<div class="config-page">
  <h1>Configuración</h1>

  @if (isLoading()) {
    <p>Cargando...</p>
  } @else {
    <form [formGroup]="form" (ngSubmit)="submit()" class="config-form">
      <div class="mb-3">
        <label for="tolerance" class="form-label">Margen de Tolerancia Dimensional (mm)</label>
        <input
          id="tolerance"
          type="number"
          step="0.1"
          class="form-control"
          formControlName="tolerance_mm"
        />
        @if (form.controls.tolerance_mm.invalid && form.controls.tolerance_mm.touched) {
          <div class="form-text text-danger">Ingresá un valor mayor a 0.</div>
        }
      </div>

      @if (successMessage()) {
        <div class="alert alert-success py-2">{{ successMessage() }}</div>
      }
      @if (errorMessage()) {
        <div class="alert alert-danger py-2">{{ errorMessage() }}</div>
      }

      <button type="submit" class="btn btn-primary" [disabled]="isSubmitting()">Guardar</button>
    </form>
  }
</div>
