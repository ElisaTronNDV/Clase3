<div class="config-page">
  <a routerLink="/home" class="back-link">← Volver</a>

  <h1>Configuración</h1>

  @if (isLoading()) {
    <p>Cargando...</p>
  } @else {
    <form [formGroup]="form" (ngSubmit)="submit()" class="config-form">
      <label for="tolerance">Margen de Tolerancia Dimensional (mm)</label>
      <input id="tolerance" type="number" step="0.1" formControlName="tolerance_mm" />
      @if (form.controls.tolerance_mm.invalid && form.controls.tolerance_mm.touched) {
        <p class="field-error">Ingresá un valor mayor a 0.</p>
      }

      @if (successMessage()) {
        <p class="form-success">{{ successMessage() }}</p>
      }
      @if (errorMessage()) {
        <p class="form-error">{{ errorMessage() }}</p>
      }

      <button type="submit" [disabled]="isSubmitting()">Guardar</button>
    </form>
  }
</div>
